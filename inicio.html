<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Restaurante — Inicio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
  body{background:#f0f0eb;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .header{text-align:center;margin-bottom:40px}
  .header h1{font-size:28px;font-weight:700;color:#111;margin-bottom:6px}
  .header .reloj{font-size:48px;font-weight:700;color:#1D9E75;letter-spacing:2px;margin-bottom:4px}
  .header .fecha{font-size:15px;color:#888;text-transform:capitalize}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:720px;width:100%}
  .card{background:#fff;border-radius:16px;border:1px solid #e5e5e5;padding:36px 28px;text-align:center;cursor:pointer;transition:all .15s;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  .card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(0,0,0,.12)}
  .card:active{transform:scale(.97)}
  .card-icon{font-size:52px}
  .card-title{font-size:20px;font-weight:700;color:#111}
  .card-desc{font-size:13px;color:#888;line-height:1.4}
  .card.pos{border-top:4px solid #1D9E75}
  .card.factura{border-top:4px solid #378ADD}
  .card.pos .card-title{color:#085041}
  .card.factura .card-title{color:#0C447C}
  .footer{margin-top:32px;font-size:12px;color:#bbb}
</style>
</head>
<body>

<div class="header">
  <div class="reloj" id="reloj">00:00</div>
  <div class="fecha" id="fecha"></div>
  <h1>&#127869; Mi Restaurante</h1>
</div>

<div class="cards">
  <a class="card pos" href="restaurante_pos_v2.html">
    <div class="card-icon">&#128179;</div>
    <div class="card-title">Punto de Venta</div>
    <div class="card-desc">Gestión de mesas, órdenes, cobros y cierre del día</div>
  </a>
  <a class="card factura" href="https://www.facturaelectronica.cr/Home" target="_blank">
    <div class="card-icon">&#128196;</div>
    <div class="card-title">Factura Electrónica</div>
    <div class="card-desc">Acceso al sistema de facturación electrónica</div>
  </a>
</div>

<div class="footer">Usa F11 para pantalla completa</div>

<script>
function actualizar(){
  const ahora=new Date();
  const h=ahora.getHours().toString().padStart(2,'0');
  const m=ahora.getMinutes().toString().padStart(2,'0');
  document.getElementById('reloj').textContent=h+':'+m;
  document.getElementById('fecha').textContent=ahora.toLocaleDateString('es-CR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
actualizar();
setInterval(actualizar,1000);
</script>
</body>
</html>
